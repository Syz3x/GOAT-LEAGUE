<script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxYH8oZCVFCSQyO6nYBon2BUPIO91U1xKLLT4aVPMr_DgTJDwY6TMHaSaeWW4qQGf4/exec";

        const TAKIM_LOGOLARI = {
            "Bozkurt FC": "image.png",
            "Gunes FC": "image2.png",
            "Vaxess FC": "image3.png",
            "Vega SK": "image4.png",
            "Huginn SK": "image5.png"
        };

        const REKLAM_LINKI = "image6.png";
        
        document.getElementById('reklam1').src = REKLAM_LINKI;
        document.getElementById('reklam2').src = REKLAM_LINKI;
        document.getElementById('reklam3').src = REKLAM_LINKI;
        document.getElementById('reklam4').src = REKLAM_LINKI;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // FORM GRAFİĞİ BÜYÜK/KÜÇÜK HARF DUYARSIZ HALE GETİRİLDİ
        function getFormGrafigi(takim, fiksturData) {
            let oynananMaclar = fiksturData.filter(m => String(m.durum).trim().toLowerCase() === "oynandı" && (m.evSahibi === takim || m.deplasman === takim));
            let son3Mac = oynananMaclar.slice(-3);
            let formHtml = '';

            son3Mac.forEach(m => {
                let evSkor = parseInt(m.evSkor);
                let depSkor = parseInt(m.depSkor);
                
                if (m.evSahibi === takim) {
                    if (evSkor > depSkor) formHtml += '<span class="form-badge form-g">G</span>';
                    else if (evSkor < depSkor) formHtml += '<span class="form-badge form-m">M</span>';
                    else formHtml += '<span class="form-badge form-b">B</span>';
                } else {
                    if (depSkor > evSkor) formHtml += '<span class="form-badge form-g">G</span>';
                    else if (depSkor < evSkor) formHtml += '<span class="form-badge form-m">M</span>';
                    else formHtml += '<span class="form-badge form-b">B</span>';
                }
            });

            return `<div class="form-container">${formHtml}</div>`;
        }

        async function verileriGetir() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const puanBody = document.getElementById('puan-body');
                puanBody.innerHTML = '';
                data.puanDurumu.sort((a, b) => b.puan - a.puan || b.av - a.av);

                data.puanDurumu.forEach(item => {
                    let takimLogosu = TAKIM_LOGOLARI[item.takim] || "https://i.hizliresim.com/k9m6n02.png";
                    let formGorseli = getFormGrafigi(item.takim, data.fikstur);

                    puanBody.innerHTML += `
                        <tr>
                            <td class="takim-hucre">
                                <img src="${takimLogosu}" class="takim-logo" alt="${item.takim}">
                                ${item.takim}
                            </td>
                            <td>${item.o}</td> <td>${item.g}</td> <td>${item.b}</td> <td>${item.m}</td>
                            <td>${item.ag}</td> <td>${item.yg}</td> <td>${item.av}</td>
                            <td class="puan-kutusu">${item.puan}</td> <td>${formGorseli}</td>
                        </tr>
                    `;
                });
                
                document.getElementById('puan-loading').style.display = 'none';
                document.getElementById('puan-tablosu').style.display = 'table';
                document.getElementById('renk-aciklamalari').style.display = 'flex'; 

                const fiksturAlan = document.getElementById('fikstur-alan');
                fiksturAlan.innerHTML = '';
                let mevcutHafta = "";

                data.fikstur.forEach(mac => {
                    if(mac.hafta !== mevcutHafta) {
                        mevcutHafta = mac.hafta;
                        fiksturAlan.innerHTML += `<div class="hafta-baslik">-- ${mevcutHafta}. GÜN --</div>`;
                    }

                    // SKOR VE TARİH GÖSTERİMİ BÜYÜK/KÜÇÜK HARF DUYARSIZ HALE GETİRİLDİ
                    let durumTemiz = String(mac.durum).trim().toLowerCase();
                    let macTarihi = mac.durum;
                    
                    if (durumTemiz !== "oynandı" && macTarihi !== "VS") {
                        let parcalar = macTarihi.split(" ");
                        if (parcalar.length > 1) {
                            let saat = parcalar.pop();
                            let tarih = parcalar.join(" ");
                            macTarihi = `<span style="font-size: 1rem;">${tarih}</span><br><span style="font-size: 0.85rem; opacity: 0.8; color: #fff;">${saat}</span>`;
                        }
                    }

                    const skorGoster = durumTemiz === "oynandı" ? `${mac.evSkor} - ${mac.depSkor}` : `<div style="color: var(--accent-color); line-height: 1.3;">${macTarihi}</div>`;
                    
                    let evLogo = TAKIM_LOGOLARI[mac.evSahibi] || "https://i.hizliresim.com/k9m6n02.png";
                    let depLogo = TAKIM_LOGOLARI[mac.deplasman] || "https://i.hizliresim.com/k9m6n02.png";

                    fiksturAlan.innerHTML += `
                        <div class="mac-kart">
                            <div class="takim-ad takim-sol">
                                <span style="font-size: 1.25rem; font-weight: 700;">${mac.evSahibi}</span> 
                                <img src="${evLogo}" style="width:45px; height:45px; object-fit:contain; margin-left: 10px;">
                            </div>
                            <div class="skor-alan">
                                ${skorGoster}
                            </div>
                            <div class="takim-ad takim-sag">
                                <img src="${depLogo}" style="width:45px; height:45px; object-fit:contain; margin-right: 10px;"> 
                                <span style="font-size: 1.25rem; font-weight: 700;">${mac.deplasman}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('fikstur-loading').style.display = 'none';

            } catch (error) {
                document.getElementById('puan-loading').innerText = "Veriler çekilirken hata oluştu. Linkleri kontrol edin.";
            }
        }

        window.onload = verileriGetir;
    </script>
